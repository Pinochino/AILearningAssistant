<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login - AI Learning Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .result.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .quick-login {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .quick-login h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #333;
        }

        .quick-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .quick-btn {
            padding: 10px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        pre {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 Test Login</h1>
        <p class="subtitle">AI Learning Assistant - Dashboard Data Test</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" value="admin@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" value="123456" required>
            </div>

            <button type="submit" id="loginBtn">🚀 Login & Test Dashboard</button>
        </form>

        <div class="quick-login">
            <h3>Quick Login:</h3>
            <div class="quick-btns">
                <button class="quick-btn" onclick="quickLogin('admin')">👑 Admin</button>
                <button class="quick-btn" onclick="quickLogin('teacher')">👨‍🏫 Teacher</button>
                <button class="quick-btn" onclick="quickLogin('student')">👨‍🎓 Student</button>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:9000/api';

        const accounts = {
            admin: { email: 'admin@gmail.com', password: '123456' },
            teacher: { email: 'teacher1@example.com', password: '123456' },
            student: { email: 'student1@example.com', password: '123456' }
        };

        function quickLogin(type) {
            const account = accounts[type];
            document.getElementById('email').value = account.email;
            document.getElementById('password').value = account.password;
        }

        function showResult(message, type = 'info', data = null) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = message;

            if (data) {
                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(data, null, 2);
                resultDiv.appendChild(pre);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Đang đăng nhập...';

            try {
                // Step 1: Login
                showResult('🔄 Bước 1: Đang đăng nhập...', 'info');

                const loginRes = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const loginData = await loginRes.json();

                if (!loginRes.ok || !loginData.success) {
                    throw new Error(loginData.message || 'Login failed');
                }

                const { user, accessToken } = loginData.data;

                // Save to localStorage
                localStorage.clear();
                localStorage.setItem('accessToken', accessToken);

                const role = user.username?.includes('teacher') ? 'teacher'
                    : user.username?.includes('admin') ? 'admin'
                        : 'student';

                localStorage.setItem('currentUser', JSON.stringify({
                    id: user._id,
                    name: user.username,
                    email: user.email,
                    role: role
                }));

                showResult(`✅ Bước 1: Đăng nhập thành công!\n👤 User: ${user.username} (${role})`, 'success');

                // Step 2: Test API calls
                setTimeout(async () => {
                    try {
                        showResult('🔄 Bước 2: Đang test API calls...', 'info');

                        const tests = [];

                        // Test Users API
                        const usersRes = await fetch(`${API_URL}/users/list`, {
                            headers: { 'Authorization': `Bearer ${accessToken}` }
                        });
                        const usersData = await usersRes.json();
                        tests.push({
                            api: 'GET /users/list',
                            status: usersRes.status,
                            success: usersRes.ok,
                            count: usersData.data?.length || 0
                        });

                        // Test Classes API
                        const classesRes = await fetch(`${API_URL}/classes`, {
                            headers: { 'Authorization': `Bearer ${accessToken}` }
                        });
                        const classesData = await classesRes.json();
                        tests.push({
                            api: 'GET /classes',
                            status: classesRes.status,
                            success: classesRes.ok,
                            count: classesData.data?.classes?.length || 0
                        });

                        // Test Subjects API
                        const subjectsRes = await fetch(`${API_URL}/subjects`, {
                            headers: { 'Authorization': `Bearer ${accessToken}` }
                        });
                        const subjectsData = await subjectsRes.json();
                        tests.push({
                            api: 'GET /subjects',
                            status: subjectsRes.status,
                            success: subjectsRes.ok,
                            count: subjectsData.data?.length || 0
                        });

                        const allSuccess = tests.every(t => t.success);

                        let message = `✅ Bước 2: API Tests ${allSuccess ? 'PASSED' : 'FAILED'}!\n\n`;
                        tests.forEach(t => {
                            message += `${t.success ? '✅' : '❌'} ${t.api}: ${t.count} items (${t.status})\n`;
                        });

                        showResult(message, allSuccess ? 'success' : 'error', tests);

                        // Step 3: Redirect
                        if (allSuccess) {
                            setTimeout(() => {
                                showResult('🎉 Tất cả tests PASSED! Đang chuyển đến dashboard...', 'success');
                                setTimeout(() => {
                                    window.location.href = '/';
                                }, 1500);
                            }, 2000);
                        }

                    } catch (error) {
                        showResult(`❌ Bước 2 thất bại: ${error.message}`, 'error');
                    }
                }, 1000);

            } catch (error) {
                showResult(`❌ Đăng nhập thất bại: ${error.message}`, 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '🚀 Login & Test Dashboard';
            }
        });
    </script>
</body>

</html>
